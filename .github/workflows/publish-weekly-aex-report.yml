name: Publish weekly AEX report

on:
  workflow_dispatch:
    inputs:
      refresh_snapshots:
        description: "Refresh live snapshots before building the review"
        required: true
        type: boolean
        default: true
      send_email:
        description: "Send the report by email using configured SMTP secrets"
        required: true
        type: boolean
        default: false
      suffix:
        description: "Two-digit daily sequence suffix for output files"
        required: true
        default: "01"
        type: string

jobs:
  publish-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages for PDF rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2 \
            libpango-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info \
            fonts-liberation \
            fonts-dejavu-core \
            fonts-lato

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests markdown weasyprint

      - name: Refresh live snapshots
        if: ${{ inputs.refresh_snapshots }}
        run: python run_aex_snapshot_suite.py

      - name: Build structure candidates
        run: python build_aex_structure_candidates.py

      - name: Refresh portfolio and Greeks state
        run: python refresh_aex_portfolio_and_risk_state.py

      - name: Generate weekly AEX review
        run: python generate_weekly_aex_option_review.py --suffix "${{ inputs.suffix }}"

      - name: Validate generated trade plan
        run: python validate_aex_trade_plan.py

      - name: Render HTML/PDF and write manifest only
        if: ${{ !inputs.send_email }}
        run: python send_aex_options_report.py --validate-only

      - name: Send email
        if: ${{ inputs.send_email }}
        env:
          MRKT_RPRTS_SMTP_HOST: ${{ secrets.MRKT_RPRTS_SMTP_HOST }}
          MRKT_RPRTS_SMTP_PORT: ${{ secrets.MRKT_RPRTS_SMTP_PORT }}
          MRKT_RPRTS_SMTP_USER: ${{ secrets.MRKT_RPRTS_SMTP_USER }}
          MRKT_RPRTS_SMTP_PASS: ${{ secrets.MRKT_RPRTS_SMTP_PASS }}
          MRKT_RPRTS_MAIL_FROM: ${{ secrets.MRKT_RPRTS_MAIL_FROM }}
          MRKT_RPRTS_MAIL_TO: ${{ secrets.MRKT_RPRTS_MAIL_TO }}
        run: python send_aex_options_report.py

      - name: Upload publish artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-aex-report-publish
          path: |
            output_aex/weekly_aex_option_review_*.md
            output_aex/aex_option_trade_plan_*.json
            output_aex/*_validation.json
            output_aex/*_delivery.html
            output_aex/*.pdf
            output_aex/*_delivery_manifest.txt
            output_aex/aex_primary_technical_snapshot.json
            output_aex/aex_cross_market_confirmation.json
            output_aex/aex_macro_snapshot.json
            output_aex/aex_option_surface_snapshot.json
            output_aex/aex_structure_candidates.json
            output_aex/aex_option_portfolio_state.json
            output_aex/aex_option_risk_state.json
            output_aex/aex_portfolio_refresh_manifest.json
