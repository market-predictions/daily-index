name: Build weekly AEX review

on:
  push:
    paths:
      - "build_aex_primary_technical_snapshot.py"
      - "build_aex_cross_market_confirmation.py"
      - "build_aex_macro_snapshot.py"
      - "build_aex_option_surface_snapshot.py"
      - "build_aex_structure_candidates.py"
      - "refresh_aex_portfolio_and_risk_state.py"
      - "run_aex_snapshot_suite.py"
      - "generate_weekly_aex_option_review.py"
      - "validate_aex_trade_plan.py"
      - ".github/workflows/build-weekly-aex-review.yml"
  workflow_dispatch:

jobs:
  build-review:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Build live snapshots
        run: python run_aex_snapshot_suite.py

      - name: Build structure candidates
        run: python build_aex_structure_candidates.py

      - name: Refresh portfolio and Greeks state
        run: python refresh_aex_portfolio_and_risk_state.py

      - name: Generate weekly AEX review
        run: python generate_weekly_aex_option_review.py

      - name: Validate generated trade plan
        run: python validate_aex_trade_plan.py

      - name: Upload generated review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-aex-review-build
          path: |
            output_aex/weekly_aex_option_review_*.md
            output_aex/aex_option_trade_plan_*.json
            output_aex/*_validation.json
            output_aex/aex_primary_technical_snapshot.json
            output_aex/aex_cross_market_confirmation.json
            output_aex/aex_macro_snapshot.json
            output_aex/aex_option_surface_snapshot.json
            output_aex/aex_structure_candidates.json
            output_aex/aex_option_portfolio_state.json
            output_aex/aex_option_risk_state.json
            output_aex/aex_portfolio_refresh_manifest.json
