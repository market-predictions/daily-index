name: Refresh AEX snapshots

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * 1-5"

jobs:
  refresh-snapshots:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run snapshot suite
        run: python run_aex_snapshot_suite.py

      - name: Upload snapshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aex-snapshots
          path: |
            output_aex/aex_primary_technical_snapshot.json
            output_aex/aex_cross_market_confirmation.json
            output_aex/aex_option_surface_snapshot.json
