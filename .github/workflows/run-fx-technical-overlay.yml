name: Run FX Technical Overlay

on:
  workflow_dispatch:

  schedule:
    - cron: "5 6 * * *"
    - cron: "30 12 * * *"
  
permissions:
  contents: write

concurrency:
  group: run-fx-technical-overlay
  cancel-in-progress: false

jobs:
  build-fx-technical-overlay:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Build FX technical overlay
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          TWELVEDATA_CALLS_PER_MINUTE: '8'
          TWELVEDATA_RATE_LIMIT_WINDOW_SECONDS: '60'
          TWELVEDATA_RATE_LIMIT_BUFFER_SECONDS: '1.0'
          TWELVEDATA_MAX_RETRIES: '5'
          TWELVEDATA_HTTP_TIMEOUT_SECONDS: '30'
        run: |
          python fx_technical_overlay.py

      - name: Commit overlay if changed
        run: |
          if [ ! -f output/fx_technical_overlay.json ]; then
            echo "output/fx_technical_overlay.json was not created"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add output/fx_technical_overlay.json

          if git diff --cached --quiet; then
            echo "No changes in fx_technical_overlay.json; nothing to commit."
          else
            git commit -m "Update FX technical overlay [skip ci]"
            git push
          fi
