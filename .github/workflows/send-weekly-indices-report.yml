name: Send weekly indices report

on:
  push:
    branches:
      - main
    paths:
      - "output_indices/weekly_indices_review_*.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages for PDF rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2 \
            libpango-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info \
            fonts-liberation \
            fonts-dejavu-core \
            fonts-lato

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install markdown weasyprint matplotlib

      - name: Run indices pricing pass dry run
        run: |
          python -m pricing_indices.run_pricing_pass

      - name: Build macro regime research snapshot
        run: |
          python -m research_indices.build_macro_regime_snapshot

      - name: Build relative strength research snapshot
        run: |
          python -m research_indices.build_relative_strength_snapshot

      - name: Build candidate evidence packs
        run: |
          python -m research_indices.build_candidate_evidence

      - name: Generate candidate ranking and discovery coverage artifacts
        run: |
          python -m pricing_indices.generate_candidate_artifacts

      - name: Assemble artifact-driven report section drafts
        run: |
          python -m pricing_indices.assemble_report_sections

      - name: Compose final report from assembled sections
        run: |
          python -m pricing_indices.compose_final_report --in-place

      - name: Validate report-vs-ranking reconciliation
        run: |
          python -m pricing_indices.validate_report_artifact_alignment

      - name: Validate HTML/PDF render before send
        run: python send_index_report_tv.py --validate-only

      - name: Send email if SMTP secrets are configured
        env:
          MRKT_RPRTS_SUBJECT_PREFIX: Weekly Indices Review
          MRKT_RPRTS_SMTP_HOST: ${{ secrets.MRKT_RPRTS_SMTP_HOST }}
          MRKT_RPRTS_SMTP_PORT: ${{ secrets.MRKT_RPRTS_SMTP_PORT }}
          MRKT_RPRTS_SMTP_USER: ${{ secrets.MRKT_RPRTS_SMTP_USER }}
          MRKT_RPRTS_SMTP_PASS: ${{ secrets.MRKT_RPRTS_SMTP_PASS }}
          MRKT_RPRTS_MAIL_FROM: ${{ secrets.MRKT_RPRTS_MAIL_FROM }}
          MRKT_RPRTS_MAIL_TO: ${{ secrets.MRKT_RPRTS_MAIL_TO }}
        run: python send_index_report_tv.py

      - name: Commit research, pricing state, and candidate artifacts back to main
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            output_indices/research/*.json \
            output_indices/index_candidate_ranking_*.json \
            output_indices/index_discovery_coverage_*.json \
            output_indices/index_portfolio_state.json \
            output_indices/index_valuation_history.csv \
            output_indices/pricing/*.json || true
          if git diff --cached --quiet; then
            echo "No research, pricing, or candidate artifact changes to commit."
            exit 0
          fi
          git commit -m "Persist Weekly Indices research and pricing artifacts [skip ci]"
          git push origin HEAD:main
