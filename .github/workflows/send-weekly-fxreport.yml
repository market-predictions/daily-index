name: Send Weekly FX Report

on:
  workflow_dispatch:
  push:
    paths:
      - 'fx.txt'
      - 'fx_technical_overlay.py'
      - 'fx_portfolio_engine.py'
      - 'generate_fx_report.py'
      - 'send_fxreport.py'
      - '.github/workflows/send-weekly-fxreport.yml'

permissions:
  contents: write

concurrency:
  group: send-weekly-fxreport
  cancel-in-progress: false

jobs:
  send-fx-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests markdown matplotlib weasyprint

      - name: Build FX technical overlay
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          TWELVEDATA_CALLS_PER_MINUTE: '8'
          TWELVEDATA_RATE_LIMIT_WINDOW_SECONDS: '60'
          TWELVEDATA_RATE_LIMIT_BUFFER_SECONDS: '1.0'
          TWELVEDATA_MAX_RETRIES: '5'
          TWELVEDATA_HTTP_TIMEOUT_SECONDS: '30'
        run: |
          python fx_technical_overlay.py

      - name: Update FX portfolio state
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          TWELVEDATA_CALLS_PER_MINUTE: '8'
          TWELVEDATA_RATE_LIMIT_WINDOW_SECONDS: '60'
          TWELVEDATA_RATE_LIMIT_BUFFER_SECONDS: '1.0'
          TWELVEDATA_MAX_RETRIES: '5'
          TWELVEDATA_HTTP_TIMEOUT_SECONDS: '30'
        run: |
          python fx_portfolio_engine.py

      - name: Generate fresh FX report markdown
        run: |
          python generate_fx_report.py

      - name: Commit generated artifacts if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          test -f output/fx_technical_overlay.json
          test -f output/fx_portfolio_state.json
          test -f output/fx_trade_ledger.csv
          test -f output/fx_valuation_history.csv
          test -f output/fx_recommendation_scorecard.csv

          latest_report="$(ls -1 output/weekly_fx_review_*.md | sort | tail -n 1)"
          test -n "$latest_report"

          git add \
            output/fx_technical_overlay.json \
            output/fx_portfolio_state.json \
            output/fx_trade_ledger.csv \
            output/fx_valuation_history.csv \
            output/fx_recommendation_scorecard.csv \
            "$latest_report"

          if git diff --cached --quiet; then
            echo "No FX artifact changes; nothing to commit."
          else
            git commit -m "Update FX overlay, portfolio state, and fresh report [skip ci]"
            git push
          fi

      - name: Validate report freshness before send
        run: |
          python send_fxreport.py --validate-only

      - name: Render and send FX report
        env:
          MRKT_RPRTS_SMTP_HOST: ${{ secrets.MRKT_RPRTS_SMTP_HOST }}
          MRKT_RPRTS_SMTP_PORT: ${{ secrets.MRKT_RPRTS_SMTP_PORT }}
          MRKT_RPRTS_SMTP_USER: ${{ secrets.MRKT_RPRTS_SMTP_USER }}
          MRKT_RPRTS_SMTP_PASS: ${{ secrets.MRKT_RPRTS_SMTP_PASS }}
          MRKT_RPRTS_MAIL_FROM: ${{ secrets.MRKT_RPRTS_MAIL_FROM }}
          MRKT_RPRTS_MAIL_TO: ${{ secrets.MRKT_RPRTS_MAIL_TO }}
        run: |
          python send_fxreport.py
